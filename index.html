<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.08);
    --accent: #4f7cff;
    --accent2: #00d4aa;
    --text: #f0f2ff;
    --muted: #8892b0;
    --danger: #ff6b6b;
    --success: #00d4aa;
    --warning: #ffa94d;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* TOP NAV */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .nav-brand span { color: var(--text); font-weight: 400; }
  .nav-info { font-size: 13px; color: var(--muted); }

  /* MAIN */
  main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 3px; height: 100%;
    background: var(--accent-color, var(--accent));
    border-radius: 0 12px 12px 0;
  }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--text); }

  /* TOOLBAR */
  .toolbar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  input[type="text"], select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    padding: 8px 40px 8px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  select { padding: 8px 14px; }
  input[type="text"]:focus, select:focus { border-color: var(--accent); }

  /* TABLE */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .table-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-title { font-size: 15px; font-weight: 600; }
  .table-count { font-size: 13px; color: var(--muted); background: var(--surface2); padding: 3px 10px; border-radius: 99px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
